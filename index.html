<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ultra EtiqBox — Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  width: 100%;
  overflow-x: hidden;
  /* NÃO bloquear overflow-y — deixa o body rolar */
}

body {
  width: 100%; min-height: 100dvh;
  overflow-y: auto;
  overflow-x: hidden;
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #05050a;

  /* ── Scrollbar personalizada (Webkit) ── */
  scrollbar-width: thin;
  scrollbar-color: rgba(220,38,38,.45) transparent;
}

/* ═══════════════════════════════════════
   SCROLLBAR PREMIUM — vermelho/vidro
═══════════════════════════════════════ */

/* Largura da faixa */
body::-webkit-scrollbar {
  width: 6px;
}

/* Trilha (track) — quase invisível */
body::-webkit-scrollbar-track {
  background: rgba(255,255,255,.03);
  border-radius: 999px;
  margin: 6px 0;
}

/* Thumb — pílula gradiente vermelha */
body::-webkit-scrollbar-thumb {
  background: linear-gradient(
    180deg,
    rgba(239,68,68,.15)  0%,
    rgba(220,38,38,.65) 40%,
    rgba(180,20,20,.85) 70%,
    rgba(220,38,38,.55) 100%
  );
  border-radius: 999px;
  border: 1px solid rgba(220,38,38,.18);
  box-shadow:
    0 0 8px rgba(220,38,38,.35),
    inset 0 1px 0 rgba(255,255,255,.12);
  transition: background .25s, box-shadow .25s;
}

body::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(
    180deg,
    rgba(239,68,68,.3)  0%,
    rgba(220,38,38,.9) 40%,
    rgba(180,20,20,1)  70%,
    rgba(220,38,38,.75) 100%
  );
  box-shadow:
    0 0 14px rgba(220,38,38,.55),
    inset 0 1px 0 rgba(255,255,255,.18);
}

body::-webkit-scrollbar-thumb:active {
  background: linear-gradient(
    180deg,
    rgba(220,38,38,.95) 0%,
    #b91c1c 50%,
    rgba(180,20,20,1)  100%
  );
  box-shadow: 0 0 20px rgba(220,38,38,.7);
}

/* Corner (onde h e v se encontram) */
body::-webkit-scrollbar-corner {
  background: transparent;
}

/* ═══════════════════════════════════════
   CAMADA DE FUNDO — partículas + grade
═══════════════════════════════════════ */
#stage {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, #150a0a 0%, #05050a 100%);
  pointer-events: none; /* não bloqueia scroll/cliques */
}

#canvas-bg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none;
}

/* Grade de linhas finas */
.grid-overlay {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(180,30,30,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,30,30,.06) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 30%, transparent 80%);
}

/* Vinheta circular */
.vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 70% at 50% 50%, transparent 20%, #05050a 85%);
  pointer-events: none;
}

/* ═══════════════════════════════════════
   ORBES ANIMADOS (atrás do card)
═══════════════════════════════════════ */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  opacity: 0;
  animation: orbFloat 0s linear infinite;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(200,20,20,.35) 0%, transparent 70%);
  left: -100px; top: -80px;
  animation: orbFloat1 18s ease-in-out infinite;
  animation-delay: 0s;
}
.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(140,10,10,.25) 0%, transparent 70%);
  right: -60px; bottom: 10%;
  animation: orbFloat2 22s ease-in-out infinite;
  animation-delay: -8s;
}
.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(220,60,10,.18) 0%, transparent 70%);
  left: 30%; top: 60%;
  animation: orbFloat3 16s ease-in-out infinite;
  animation-delay: -4s;
}

@keyframes orbFloat1 {
  0%,100% { transform: translate(0,0) scale(1); opacity: .7; }
  33% { transform: translate(60px, 40px) scale(1.1); opacity: .5; }
  66% { transform: translate(-30px, 80px) scale(.9); opacity: .8; }
}
@keyframes orbFloat2 {
  0%,100% { transform: translate(0,0) scale(1); opacity: .6; }
  50% { transform: translate(-80px, -50px) scale(1.2); opacity: .4; }
}
@keyframes orbFloat3 {
  0%,100% { transform: translate(0,0) scale(1); opacity: .5; }
  40% { transform: translate(100px, -60px) scale(1.15); opacity: .3; }
  70% { transform: translate(-40px, 30px) scale(.85); opacity: .6; }
}

/* ═══════════════════════════════════════
   SCANLINES (textura cinematográfica)
═══════════════════════════════════════ */
.scanlines {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,.07) 3px,
    rgba(0,0,0,.07) 4px
  );
  pointer-events: none;
  animation: scanMove 8s linear infinite;
}
@keyframes scanMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 80px; }
}

/* ═══════════════════════════════════════
   LAYOUT CENTRAL
═══════════════════════════════════════ */
.screen {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 60px;
}

/* ═══════════════════════════════════════
   CARD GLASSMORPHISM
═══════════════════════════════════════ */
.glass-card {
  position: relative;
  width: 100%; max-width: 420px;
  background: rgba(14,6,6,.65);
  border: 1px solid rgba(220,38,38,.18);
  border-radius: 24px;
  padding: 44px 40px 40px;
  backdrop-filter: blur(32px) saturate(1.4);
  -webkit-backdrop-filter: blur(32px) saturate(1.4);
  box-shadow:
    0 0 0 1px rgba(220,38,38,.08) inset,
    0 40px 80px rgba(0,0,0,.7),
    0 0 60px rgba(180,20,20,.08);
  animation: cardIn 1s cubic-bezier(.16,1,.3,1) both;
  animation-delay: .2s;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(28px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Linha superior brilhante */
.glass-card::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(220,38,38,.6), transparent);
  border-radius: 999px;
}

/* Reflexo interno */
.glass-card::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 24px;
  background: radial-gradient(ellipse 80% 30% at 50% 0%, rgba(220,38,38,.06), transparent);
  pointer-events: none;
}

/* ═══════════════════════════════════════
   LOGO / CHEVRONS
═══════════════════════════════════════ */
.logo-wrap {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  animation: fadeSlideUp .8s cubic-bezier(.16,1,.3,1) both;
  animation-delay: .5s;
}

.chevron-stack {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  filter: drop-shadow(0 0 12px rgba(220,38,38,.5));
}
.chevron-svg { animation: chevPulse 2s ease-in-out infinite; }
.chevron-svg:nth-child(2) { animation-delay: .15s; }
.chevron-svg:nth-child(3) { animation-delay: .3s; }

@keyframes chevPulse {
  0%,100% { transform: translateY(0); opacity: .9; }
  50% { transform: translateY(-3px); opacity: 1; }
}

/* ═══════════════════════════════════════
   ULTRASTOCK — ANIMAÇÃO PREMIUM DO NOME
═══════════════════════════════════════ */
.brand {
  text-align: center;
  margin-bottom: 6px;
  animation: fadeSlideUp .9s cubic-bezier(.16,1,.3,1) both;
  animation-delay: .6s;
}

.brand-row {
  display: flex; align-items: baseline; justify-content: center;
  gap: 6px; line-height: 1;
}

/* ULTRA — metálico prata */
.brand-ultra {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(46px, 8vw, 60px);
  letter-spacing: .06em;
  background: linear-gradient(180deg,
    #ffffff 0%, #e8e8e8 35%, #c0c0c0 65%, #888 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(255,255,255,.12));
  position: relative;
  animation: ultraReveal 1.2s cubic-bezier(.16,1,.3,1) both;
  animation-delay: .65s;
}

@keyframes ultraReveal {
  0% { opacity: 0; transform: translateX(-24px) skewX(-4deg); filter: blur(8px) drop-shadow(0 2px 8px rgba(255,255,255,.12)); }
  60% { filter: blur(0px) drop-shadow(0 2px 8px rgba(255,255,255,.12)); }
  100% { opacity: 1; transform: translateX(0) skewX(0); }
}

/* STOCK — dourado com brilho varrendo */
.brand-stock {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(46px, 8vw, 60px);
  letter-spacing: .06em;
  background: linear-gradient(180deg,
    #ffe066 0%, #f5c800 30%, #d4a017 65%, #8a5f00 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  overflow: hidden;
  animation: stockReveal 1.2s cubic-bezier(.16,1,.3,1) both;
  animation-delay: .75s;
}

@keyframes stockReveal {
  0% { opacity: 0; transform: translateX(24px) skewX(4deg); filter: blur(8px); }
  60% { filter: blur(0px); }
  100% { opacity: 1; transform: translateX(0) skewX(0); }
}

/* Brilho que varre o nome STOCK */
.brand-stock-inner {
  display: inline-block;
  position: relative;
}
.brand-stock-inner::after {
  content: 'STOCK';
  position: absolute; inset: 0;
  font-family: 'Bebas Neue', sans-serif;
  font-size: inherit;
  letter-spacing: .06em;
  background: linear-gradient(105deg,
    transparent 30%, rgba(255,255,220,.85) 50%, transparent 70%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200% 100%;
  animation: shineSwipe 4s ease-in-out infinite;
  animation-delay: 1.5s;
}

@keyframes shineSwipe {
  0%   { background-position: -100% 0; }
  30%  { background-position: 200% 0; }
  100% { background-position: 200% 0; }
}

/* Linha divisória pulsante */
.brand-divider {
  width: 60px; height: 2px; margin: 10px auto 4px;
  background: linear-gradient(90deg, transparent, #DC2626, transparent);
  border-radius: 999px;
  animation: dividerGrow 1s cubic-bezier(.16,1,.3,1) both, dividerPulse 3s ease-in-out 1.5s infinite;
  animation-delay: .9s, 1.5s;
}

@keyframes dividerGrow {
  from { transform: scaleX(0); opacity: 0; }
  to   { transform: scaleX(1); opacity: 1; }
}
@keyframes dividerPulse {
  0%,100% { opacity: .6; width: 60px; }
  50% { opacity: 1; width: 90px; }
}

/* ═══════════════════════════════════════
   TAGLINE
═══════════════════════════════════════ */
.tagline {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeSlideUp .8s cubic-bezier(.16,1,.3,1) both;
  animation-delay: .95s;
}
.tagline p {
  font-size: 13px; font-weight: 400;
  color: rgba(200,190,190,.5);
  letter-spacing: .12em;
  text-transform: uppercase;
  line-height: 1;
}
.tagline span { color: rgba(220,80,80,.75); font-weight: 500; }

/* ═══════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════ */
.form-section {
  animation: fadeSlideUp .8s cubic-bezier(.16,1,.3,1) both;
  animation-delay: 1.05s;
}

.field-label {
  display: block;
  font-size: 10px; font-weight: 500;
  color: rgba(200,150,150,.55);
  text-transform: uppercase;
  letter-spacing: .2em;
  margin-bottom: 8px;
}

.field {
  position: relative; margin-bottom: 16px;
}

.field-input {
  width: 100%; height: 50px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(220,38,38,.15);
  border-radius: 12px;
  padding: 0 44px 0 16px;
  font-size: 15px; font-weight: 400;
  font-family: 'DM Sans', system-ui, sans-serif;
  color: rgba(255,255,255,.9);
  outline: none;
  transition: border-color .2s, background .2s, box-shadow .2s;
  box-sizing: border-box;
}
.field-input::placeholder { color: rgba(255,255,255,.18); }
.field-input:focus {
  border-color: rgba(220,38,38,.5);
  background: rgba(220,38,38,.04);
  box-shadow: 0 0 0 3px rgba(220,38,38,.08), 0 0 20px rgba(220,38,38,.06);
}

/* ─ mono para CNPJ ─ */
.field-input.mono {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 14px; letter-spacing: .04em;
}

.eye-btn {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,.25); padding: 0;
  transition: color .2s;
}
.eye-btn:hover { color: rgba(255,255,255,.6); }

/* ─ Submit ─ */
.btn-submit {
  position: relative;
  width: 100%; height: 50px;
  border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, #C42222 0%, #DC2626 50%, #B91C1C 100%);
  color: #fff;
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 15px; font-weight: 500;
  letter-spacing: .04em;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 0 4px 24px rgba(220,38,38,.35), 0 1px 0 rgba(255,255,255,.08) inset;
  margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-submit:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(220,38,38,.5), 0 1px 0 rgba(255,255,255,.08) inset;
}
.btn-submit:active:not(:disabled) { transform: translateY(0); }
.btn-submit:disabled { opacity: .55; cursor: not-allowed; transform: none; }

/* Brilho varrendo */
.btn-submit .shine {
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.22) 50%, transparent 70%);
  background-size: 200% 100%;
  transform: translateX(-100%);
  transition: none;
}
.btn-submit:hover .shine {
  animation: btnShine .5s ease-in-out;
}
@keyframes btnShine {
  to { transform: translateX(100%); }
}

/* ─ Links ─ */
.form-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px; color: rgba(200,180,180,.35);
}
.form-footer a {
  color: rgba(250,204,21,.65);
  cursor: pointer; text-decoration: none;
  font-weight: 500;
  transition: color .2s;
}
.form-footer a:hover { color: rgba(250,204,21,.95); }

/* ─ Mensagens erro/ok ─ */
.msg-box {
  border-radius: 10px; padding: 10px 14px;
  font-size: 12px; margin-bottom: 14px;
  display: none; line-height: 1.5;
}
.msg-err {
  background: rgba(220,38,38,.1);
  border: 1px solid rgba(220,38,38,.3);
  color: #f87171;
}
.msg-ok {
  background: rgba(34,197,94,.08);
  border: 1px solid rgba(34,197,94,.25);
  color: #4ade80;
}

/* ═══════════════════════════════════════
   RODAPÉ
═══════════════════════════════════════ */
.login-footer {
  position: relative;
  z-index: 11;
  text-align: center;
  padding: 16px 0 8px;
  font-size: 10px;
  color: rgba(255,255,255,.12);
  letter-spacing: .15em;
  text-transform: uppercase;
  animation: fadeSlideUp .6s ease both;
  animation-delay: 1.4s;
}

/* ═══════════════════════════════════════
   INDICADOR DE SCROLL — seta pulsante
   Aparece quando há conteúdo abaixo
═══════════════════════════════════════ */
.scroll-hint {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .4s ease;
}
.scroll-hint.visible { opacity: 1; }

.scroll-hint-label {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: rgba(220,100,100,.55);
  font-weight: 500;
}

.scroll-hint-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.scroll-hint-chevron {
  width: 20px; height: 10px;
  opacity: 0;
  animation: hintChevron 1.6s ease-in-out infinite;
}
.scroll-hint-chevron:nth-child(2) { animation-delay: .18s; }
.scroll-hint-chevron:nth-child(3) { animation-delay: .36s; }

@keyframes hintChevron {
  0%   { opacity: 0;   transform: translateY(-4px); }
  40%  { opacity: .75; transform: translateY(0); }
  80%  { opacity: 0;   transform: translateY(4px); }
  100% { opacity: 0; }
}

/* ═══════════════════════════════════════
   BOTÃO VOLTAR AO TOPO
═══════════════════════════════════════ */
.back-to-top {
  position: fixed;
  bottom: 28px;
  right: 20px;
  z-index: 999;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(10,4,4,.75);
  border: 1px solid rgba(220,38,38,.3);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .35s ease, transform .35s ease, box-shadow .25s, border-color .25s;
  pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.5), 0 0 12px rgba(220,38,38,.12);
}
.back-to-top.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.back-to-top:hover {
  border-color: rgba(220,38,38,.65);
  box-shadow: 0 6px 24px rgba(0,0,0,.6), 0 0 20px rgba(220,38,38,.28);
}
.back-to-top:hover svg { transform: translateY(-2px); }
.back-to-top svg {
  transition: transform .2s;
  filter: drop-shadow(0 0 4px rgba(220,38,38,.5));
}

/* ─ Linha de progresso de scroll (topo da página) ─ */
.scroll-progress {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  width: 0%;
  z-index: 1000;
  background: linear-gradient(
    90deg,
    rgba(180,20,20,.4) 0%,
    #DC2626 40%,
    #EF4444 70%,
    rgba(255,200,100,.8) 100%
  );
  border-radius: 0 999px 999px 0;
  box-shadow: 0 0 10px rgba(220,38,38,.5), 0 0 4px rgba(220,38,38,.8);
  transition: width .08s linear;
  pointer-events: none;
}

/* ─ Cadastro ─ */
#cadForm { display: none; }

/* ═══════════════════════════════════════
   ANIMAÇÕES UTILITÁRIAS
═══════════════════════════════════════ */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ─── FUNDO ─── -->
<div id="stage">
  <canvas id="canvas-bg"></canvas>
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="vignette"></div>
</div>

<div class="scanlines"></div>

<!-- ─── CARD CENTRAL ─── -->
<div class="screen">
  <div class="glass-card">

    <!-- Logo chevrons -->
    <div class="logo-wrap">
      <div class="chevron-stack">
        <svg class="chevron-svg" width="28" height="13" viewBox="0 0 28 13" fill="none">
          <path d="M2 11L14 2L26 11" stroke="url(#cg1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="cg1" x1="2" y1="6" x2="26" y2="6"><stop stop-color="#DC2626"/><stop offset=".5" stop-color="#EF4444"/><stop offset="1" stop-color="#DC2626"/></linearGradient></defs>
        </svg>
        <svg class="chevron-svg" width="28" height="13" viewBox="0 0 28 13" fill="none">
          <path d="M2 11L14 2L26 11" stroke="url(#cg2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="cg2" x1="2" y1="6" x2="26" y2="6"><stop stop-color="#DC2626"/><stop offset=".5" stop-color="#EF4444"/><stop offset="1" stop-color="#DC2626"/></linearGradient></defs>
        </svg>
        <svg class="chevron-svg" width="28" height="13" viewBox="0 0 28 13" fill="none">
          <path d="M2 11L14 2L26 11" stroke="url(#cg3)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="cg3" x1="2" y1="6" x2="26" y2="6"><stop stop-color="#DC2626"/><stop offset=".5" stop-color="#EF4444"/><stop offset="1" stop-color="#DC2626"/></linearGradient></defs>
        </svg>
      </div>
    </div>

<script>
/* ═══════════════════════════════════════
   CANVAS — PARTÍCULAS ORBITAIS PREMIUM
   Sistema de partículas com conexões
   dinâmicas e profundidade em z
═══════════════════════════════════════ */
(function(){
  const cv = document.getElementById('canvas-bg');
  const ctx = cv.getContext('2d');
  let W, H, pts, raf;

  function resize(){
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }

  function mkPt(){
    const angle = Math.random() * Math.PI * 2;
    const speed = .12 + Math.random() * .25;
    const z = .3 + Math.random() * .7; // profundidade
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(angle) * speed * (.5 + z * .5),
      vy: Math.sin(angle) * speed * (.5 + z * .5),
      r: 1 + z * 2,
      z,
      // pulso individual
      phase: Math.random() * Math.PI * 2,
      phaseSpeed: .008 + Math.random() * .012
    };
  }

  function init(){
    resize();
    const N = Math.min(120, Math.floor(W * H / 12000));
    pts = Array.from({length: N}, mkPt);
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);

    const t = Date.now() * .001;

    pts.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.phase += p.phaseSpeed;
      // rebate nas bordas
      if(p.x < 0)  { p.x = 0;  p.vx *= -1; }
      if(p.x > W)  { p.x = W;  p.vx *= -1; }
      if(p.y < 0)  { p.y = 0;  p.vy *= -1; }
      if(p.y > H)  { p.y = H;  p.vy *= -1; }
    });

    // Conexões
    const maxD = 160;
    for(let i = 0; i < pts.length; i++){
      for(let j = i+1; j < pts.length; j++){
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if(d < maxD){
          const alpha = (1 - d/maxD) * .18 * ((pts[i].z + pts[j].z) * .5);
          ctx.beginPath();
          ctx.strokeStyle = `rgba(200,30,30,${alpha})`;
          ctx.lineWidth = .8;
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.stroke();
        }
      }
    }

    // Pontos
    pts.forEach(p => {
      const pulse = 1 + Math.sin(p.phase) * .3;
      const r = p.r * pulse;
      const alpha = (.25 + p.z * .45) * (.7 + Math.sin(p.phase) * .3);

      // Halo externo
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 4);
      g.addColorStop(0, `rgba(220,38,38,${alpha * .6})`);
      g.addColorStop(1, `rgba(220,38,38,0)`);
      ctx.beginPath();
      ctx.fillStyle = g;
      ctx.arc(p.x, p.y, r * 4, 0, Math.PI * 2);
      ctx.fill();

      // Núcleo
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,${80 + p.z*80|0},${50 + p.z*30|0},${alpha})`;
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    });

    raf = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  draw();
})();

/* ═══════════════════════════════════════
   FORM HELPERS
═══════════════════════════════════════ */
function maskCnpj(el){
  let v = el.value.replace(/\D/g,'').slice(0,14);
  if(v.length>12) v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2})/,'$1.$2.$3/$4-$5');
  else if(v.length>8) v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4})/,'$1.$2.$3/$4');
  else if(v.length>5) v=v.replace(/^(\d{2})(\d{3})(\d{0,3})/,'$1.$2.$3');
  else if(v.length>2) v=v.replace(/^(\d{2})(\d{0,3})/,'$1.$2');
  el.value = v;
}

function togglePwd(id, btn){
  const inp = document.getElementById(id);
  if(!inp) return;
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

function showMsg(id, msg, type){
  const el = document.getElementById(id); if(!el) return;
  el.style.display = 'block';
  el.className = 'msg-box ' + (type==='ok' ? 'msg-ok' : 'msg-err');
  el.textContent = msg;
}
function hideMsg(id){ const el=document.getElementById(id); if(el) el.style.display='none'; }

function showCad(){
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('cadForm').style.display   = 'block';
}
function showLogin(){
  document.getElementById('cadForm').style.display   = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

/* stubs — integrar com lógica Supabase original */
async function doLogin(){
  hideMsg('loginErr'); hideMsg('loginOk');
  const btn = document.getElementById('lBtn');
  document.getElementById('lBtnTxt').textContent = 'Acessando…';
  btn.disabled = true;
  /* ← aqui entra a lógica real do sistema */
  setTimeout(()=>{ btn.disabled=false; document.getElementById('lBtnTxt').textContent='Acessar Sistema'; showMsg('loginErr','Conecte à instância do sistema real.','err'); }, 1200);
}
async function doCadastro(){
  hideMsg('cadErr'); hideMsg('cadOk');
  const btn = document.getElementById('cBtn');
  document.getElementById('cBtnTxt').textContent = 'Cadastrando…';
  btn.disabled = true;
  setTimeout(()=>{ btn.disabled=false; document.getElementById('cBtnTxt').textContent='Cadastrar Loja'; showMsg('cadErr','Conecte à instância do sistema real.','err'); }, 1200);
}

/* ═══════════════════════════════════════
   SCROLL — progresso + hint + back-to-top
═══════════════════════════════════════ */
(function(){
  const progress  = document.getElementById('scrollProgress');
  const hint      = document.getElementById('scrollHint');
  const backToTop = document.getElementById('backToTop');

  let ticking = false;

  function onScroll(){
    if(ticking) return;
    ticking = true;
    requestAnimationFrame(update);
  }

  function update(){
    const scrollY   = window.scrollY || window.pageYOffset;
    const docH      = document.documentElement.scrollHeight - window.innerHeight;
    const pct       = docH > 0 ? (scrollY / docH) * 100 : 0;

    // Barra de progresso
    if(progress) progress.style.width = pct + '%';

    // Hint (seta para baixo) — visível só perto do topo E se há scroll disponível
    if(hint){
      const hasScroll = docH > 10;
      const nearTop   = scrollY < 60;
      hint.classList.toggle('visible', hasScroll && nearTop);
    }

    // Botão voltar ao topo — aparece após rolar 120px
    if(backToTop){
      backToTop.classList.toggle('visible', scrollY > 120);
    }

    ticking = false;
  }

  window.addEventListener('scroll', onScroll, { passive: true });

  // Avalia no load (caso a página já comece com scroll)
  window.addEventListener('load', update);
  // Pequeno delay para o DOM renderizar tudo
  setTimeout(update, 400);
})();
</script>
