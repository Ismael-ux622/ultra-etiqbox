<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container Principal: Centraliza tudo e cria o fundo escuro para as faíscas */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a1a2e, #0f0f1a);
            overflow: hidden;
            position: relative;
        }

        /* --- EFEITO DAS MINI FAÍSCAS (BACKGROUND) --- */
        .spark {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffdf00, 0 0 15px #fff;
            animation: floatSparks 6s linear infinite;
            opacity: 0;
            pointer-events: none; /* Garante que não atrapalhe os cliques */
        }

        @keyframes floatSparks {
            0% {
                transform: translateY(100vh) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) translateX(50px) scale(1.2);
                opacity: 0;
            }
        }

        /* --- CARD DE LOGIN CENTRALIZADO --- */
        .login-card {
            width: 100%;
            max-width: 380px; /* Evita o efeito de "zoom 120%" em telas grandes */
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Efeito de vidro fosco chique */
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: #ffffff;
            z-index: 10; /* Garante que o card fique acima das faíscas */
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Grupos de Input */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #ffdf00;
            box-shadow: 0 0 8px rgba(255, 223, 0, 0.3);
        }

        /* Botão de Entrar */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #ffdf00;
            border: none;
            border-radius: 6px;
            color: #111;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #ffe853;
            box-shadow: 0 0 15px rgba(255, 223, 0, 0.4);
        }

        /* --- CORREÇÃO DO TEXTO MISTURADO (CRIAR CONTA) --- */
        .footer-text {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #aaa;
            display: flex;             /* Organiza o conteúdo em linha */
            justify-content: center;   /* Centraliza o bloco */
            gap: 5px;                  /* Cria um espaçamento seguro entre o texto e o link */
            flex-wrap: wrap;           /* Se a tela for muito pequena, ele quebra a linha sem misturar */
        }

        .footer-text a {
            color: #ffdf00;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Container do Login -->
    <div class="login-card">
        <h2>Área de Acesso</h2>
        
        <form action="#">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Seu e-mail" required>
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>
            
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <!-- Texto corrigido e espaçado aqui -->
        <div class="footer-text">
            <span>Ainda não tem uma conta?</span>
            <a href="#">Criar conta</a>
        </div>
    </div>

    /* --- SCRIPT PARA GERAR AS FAÍSCAS ALEATÓRIAS --- */
    <script>
        function createSparks() {
            const count = 40; // Quantidade de faíscas na tela
            const body = document.body;

            for (let i = 0; i < count; i++) {
                let spark = document.createElement('div');
                spark.classList.add('spark');
                
                // Posições e atrasos aleatórios para parecer natural
                spark.style.left = Math.random() * 100 + 'vw';
                spark.style.animationDelay = Math.random() * 5 + 's';
                spark.style.animationDuration = (Math.random() * 4 + 4) + 's'; // Entre 4 e 8 segundos
                
                // Cores levemente diferentes (ouro, branco, amarelo)
                const colors = ['#ffdf00', '#ffffff', '#ffb700'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                spark.style.boxShadow = `0 0 8px ${randomColor}, 0 0 15px #fff`;

                body.appendChild(spark);
            }
        }

        // Inicia o efeito ao carregar a página
        createSparks();
    </script>

</body>
</html>
